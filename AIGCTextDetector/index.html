<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Text Detection</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      max-width: 820px;
      margin: 0 auto;
      padding: 20px;
      line-height: 1.6;
      color: #222;
    }

    h1 { text-align: center; color: #333; margin-bottom: 4px; }
    .subtitle { text-align: center; color: #666; margin-top: 0; font-size: 14px; }

    textarea {
      width: 100%;
      height: 200px;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
      resize: vertical;
    }

    button {
      display: block;
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      font-size: 16px;
      color: #fff;
      background-color: #007bff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color .15s;
    }
    button:hover  { background-color: #0056b3; }
    button:disabled { background-color: #aaa; cursor: not-allowed; }

    /* Loading bar */
    #loadingBar {
      width: 100%;
      height: 4px;
      background: #e9ecef;
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
      display: none;
    }
    #loadingBar .fill {
      height: 100%;
      width: 0%;
      background: #007bff;
      transition: width .3s ease;
    }
    #loadingStatus {
      font-size: 13px;
      color: #666;
      margin-top: 4px;
      min-height: 18px;
    }

    /* Result area */
    #result {
      margin-top: 20px;
      padding: 15px;
      border: 1px solid #eee;
      border-radius: 4px;
      background: #f9f9f9;
      white-space: pre-wrap;
      min-height: 100px;
      font-size: 15px;
      line-height: 1.8;
    }

    /* Highlighted spans */
    .ai-text {
      border-radius: 2px;
      cursor: help;
      position: relative;
    }
    .ai-text-2 { background-color: #fffacd; }   /* 2 models – light yellow */
    .ai-text-3 { background-color: #ffd700; }   /* 3 models – yellow       */
    .ai-text-4 { background-color: #ffcccc; }   /* 4+ models – pink/red    */

    .ai-text:hover::after {
      content: attr(data-models);
      position: absolute;
      bottom: 110%;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      white-space: nowrap;
      z-index: 10;
      pointer-events: none;
    }

    /* Legend */
    .legend {
      margin-top: 8px;
      font-size: 13px;
      color: #555;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .legend-swatch {
      display: inline-block;
      width: 14px;
      height: 14px;
      border-radius: 2px;
      vertical-align: middle;
      margin-right: 3px;
    }

    /* Stats bar — gray secondary lines */
    #stats, #weightedStats {
      margin-top: 6px;
      font-size: 13px;
      color: #999;
      min-height: 18px;
    }

    /* Verdict + char AI rate — prominent */
    #verdict {
      margin-top: 14px;
      font-size: 15px;
      color: #444;
      min-height: 22px;
    }
    .verdict-badge {
      display: inline-block;
      padding: 2px 13px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 15px;
      margin-left: 5px;
    }
    .verdict-human       { background: #d4edda; color: #155724; }
    .verdict-maybe-human { background: #fff3cd; color: #856404; }
    .verdict-maybe-ai    { background: #f8d7da; color: #721c24; }

    #charStats {
      margin-top: 5px;
      font-size: 14px;
      font-weight: 600;
      color: #333;
      min-height: 18px;
    }

    /* Per-model breakdown — gray */
    #modelStats {
      margin-top: 4px;
      font-size: 13px;
      color: #999;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <h1>AI Text Detection</h1>

  <div id="loadingBar"><div class="fill" id="loadingFill"></div></div>
  <div id="loadingStatus">Model not loaded — confirm the download to start.</div>
  <p>本在线演示中使用的模型仅针对中文文本进行训练，输入其他文本可能会导致输出结果出现系统性偏差。</p>
  <textarea id="inputText" placeholder="在此处输入长中文文本，建议至少 1000 字，输入过短或输入其他内容可能导致结果不准确。" disabled></textarea>
  <button id="analyzeBtn" disabled>Analyze Text</button>

  <div class="legend">
    <span><span class="legend-swatch" style="background:#fffacd"></span>2 models</span>
    <span><span class="legend-swatch" style="background:#ffd700"></span>3 models</span>
    <span><span class="legend-swatch" style="background:#ffcccc"></span>4+ models</span>
    <span style="color:#999">Hover highlighted text to see which models flagged it.</span>
  </div>

  <div id="shortWarning"></div>
  <div id="verdict"></div>
  <div id="charStats"></div>
  <div id="modelStats"></div>
  <div id="stats"></div>
  <div id="weightedStats"></div>
  <div id="result">Results will appear here…</div>

  <script>
  'use strict';

  // ──────────────────────────────────────────────────────────────────────────
  // AI Detection Module
  // ──────────────────────────────────────────────────────────────────────────

  // ── Constants ────────────────────────────────────────────────────────────
  const MODEL_NAMES = [
    'gemini', 'qwen', 'pony', 'kimi25', 'glm47', 'doubao', 'deepseekv32'
  ];

  // Regex mirrors the Python server: keep Chinese + basic ASCII + fullwidth
  const CLEAN_RE = /[^a-zA-Z0-9\n,.;?!\u4e00-\u9fa5\u3000-\u303f\uff00-\uffef]/g;
  // Sentence-ending punctuation (same delimiters as server.py)
  const SPLIT_RE  = /([。！？；?!\n])/g;

  // ── State ────────────────────────────────────────────────────────────────
  let modelsData = null;   // { modelName: { weights, intercept } }

  // ── Utilities ────────────────────────────────────────────────────────────

  /**
   * Split text on sentence-ending punctuation, keeping delimiters attached
   * to the preceding chunk (same behaviour as server.py).
   */
  function splitText(text) {
    const parts  = text.split(SPLIT_RE);
    const chunks = [];
    for (let i = 0; i < parts.length; i += 2) {
      let chunk = parts[i];
      if (i + 1 < parts.length) chunk += parts[i + 1];
      if (chunk) chunks.push(chunk);
    }
    return chunks;
  }

  function cleanChunk(chunk) {
    return chunk.replace(CLEAN_RE, '').trim();
  }

  // ── Inference ────────────────────────────────────────────────────────────

  /**
   * Run all 7 binary classifiers on a (pre-cleaned) text chunk.
   *
   * Inference (mirrors sklearn with norm='l2', sublinear_tf=True):
   *   tf = 1 + ln(count)
   *   raw = Σ tf · combined   (combined = idf · coef, precomputed)
   *   norm = sqrt(Σ (tf · idf)²)
   *   score = raw / norm + intercept
   *
   * weights[gram] = [combined, idf]
   *
   * @param {string} text  Cleaned chunk (≥ 5 chars)
   * @returns {string[]}   Names of models that flagged the chunk as AI
   */
  function classifyChunk(text) {
    // Count char n-grams (2–5) — must match training ngram_range=(2,5)
    const counts = Object.create(null);
    const len = text.length;
    for (let n = 2; n <= 5; n++) {
      const stop = len - n + 1;
      for (let i = 0; i < stop; i++) {
        const gram = text.slice(i, i + n);
        counts[gram] = (counts[gram] || 0) + 1;
      }
    }

    const aiModels = [];

    for (const name of MODEL_NAMES) {
      const { weights, intercept } = modelsData[name];

      let rawScore = 0;
      let normSq   = 0;
      for (const gram in counts) {
        const w = weights[gram];
        if (w !== undefined) {
          const tf = 1 + Math.log(counts[gram]);
          const combined = w[0];  // idf · coef
          const idf      = w[1];
          rawScore += tf * combined;
          normSq   += (tf * idf) * (tf * idf);
        }
      }

      if (normSq < 1e-30) {
        if (intercept > 0) aiModels.push(name);
        continue;
      }
      const decision = rawScore / Math.sqrt(normSq) + intercept;
      if (decision > 0) aiModels.push(name);
    }

    return aiModels;
  }

  /**
   * Analyse full text: split into chunks, classify each one.
   */
  function analyzeText(text) {
    const chunks  = splitText(text);
    const results = [];

    for (const chunk of chunks) {
      const clean = cleanChunk(chunk);
      if (clean.length >= 5) {
        const models = classifyChunk(clean);
        results.push({ text: chunk, clean, is_ai: models.length >= 2, models });
      } else {
        results.push({ text: chunk, clean, is_ai: false, models: [] });
      }
    }

    return results;
  }

  // ── Rendering ────────────────────────────────────────────────────────────

  function renderResults(results) {
    const resultDiv = document.getElementById('result');
    const statsDiv  = document.getElementById('stats');
    resultDiv.innerHTML = '';

    let aiChunks        = 0;
    let totalChunks     = 0;
    let aiChars         = 0;
    let totalChars      = 0;
    let weightedAiChars = 0;

    const MODEL_WEIGHT = { 2: 0.33, 3: 0.66 };  // 4+ → 1.0

    // Per-model char counts
    const modelCharCounts = Object.fromEntries(MODEL_NAMES.map(n => [n, 0]));

    for (const item of results) {
      if (item.clean.length < 5) {
        resultDiv.appendChild(document.createTextNode(item.text));
        totalChars += item.clean.length;
        continue;
      }
      totalChunks++;
      totalChars += item.clean.length;

      for (const m of item.models) modelCharCounts[m] += item.clean.length;

      if (item.is_ai) {
        aiChunks++;
        aiChars += item.clean.length;
        const w = MODEL_WEIGHT[item.models.length] ?? 1.0;
        weightedAiChars += item.clean.length * w;
        const span = document.createElement('span');
        const n    = item.models.length;
        span.className = 'ai-text ai-text-' + Math.min(n, 4);
        span.textContent = item.text;
        span.setAttribute('data-models', 'Flagged by: ' + item.models.join(', '));
        resultDiv.appendChild(span);
      } else {
        resultDiv.appendChild(document.createTextNode(item.text));
      }
    }

    const charPctNum = totalChars > 0 ? (aiChars / totalChars) * 100 : 0;
    const charPctStr = charPctNum.toFixed(1);

    // ── Short-text warning ────────────────────────────────────────────────
    const shortWarnDiv = document.getElementById('shortWarning');
    if (totalChars < 1000 || totalChunks < 10) {
      shortWarnDiv.style.cssText = 'background:#fff3cd;color:#856404;border:1px solid #ffc107;border-radius:4px;padding:6px 10px;margin:12px 0;font-size:13px;';
      shortWarnDiv.textContent = '⚠ Warning: Input text is too short — results may be unreliable.';
    } else {
      shortWarnDiv.style.cssText = '';
      shortWarnDiv.textContent = '';
    }

    // ── Verdict ──────────────────────────────────────────────────────────
    let verdictLabel, verdictClass;
    if (charPctNum < 50) {
      verdictLabel = 'Human (<50%)';       verdictClass = 'verdict-human';
    } else if (charPctNum <= 70) {
      verdictLabel = 'Maybe Human (50%-70%)'; verdictClass = 'verdict-maybe-human';
    } else {
      verdictLabel = 'Maybe AI (>70%)';    verdictClass = 'verdict-maybe-ai';
    }
    document.getElementById('verdict').innerHTML =
      `Overall: <span class="verdict-badge ${verdictClass}">${verdictLabel}</span>`;

    // ── Char stats ───────────────────────────────────────────────────────
    document.getElementById('charStats').textContent =
      `${aiChars.toLocaleString()} / ${totalChars.toLocaleString()} chars flagged as AI (${charPctStr}%)`;

    // ── Per-model breakdown (sorted high → low) ──────────────────────────
    const modelEntries = MODEL_NAMES
      .map(name => ({ name, chars: modelCharCounts[name] }))
      .sort((a, b) => b.chars - a.chars);
    document.getElementById('modelStats').textContent =
      'By model: ' + modelEntries.map(({ name, chars }) => {
        const pct = totalChars > 0 ? ((chars / totalChars) * 100).toFixed(1) : '0.0';
        return `${name} ${pct}%`;
      }).join(' · ');

    // ── Sentence stats ───────────────────────────────────────────────────
    const pct = totalChunks > 0
      ? ((aiChunks / totalChunks) * 100).toFixed(1)
      : 0;
    statsDiv.textContent =
      `${aiChunks} / ${totalChunks} sentences flagged as AI (${pct}%)`;

    // ── Weighted stats ───────────────────────────────────────────────────
    const wAi  = Math.round(weightedAiChars);
    const wPct = totalChars > 0
      ? ((weightedAiChars / totalChars) * 100).toFixed(1)
      : 0;
    document.getElementById('weightedStats').textContent =
      `${wAi.toLocaleString()} / ${totalChars.toLocaleString()} chars (weighted) flagged as AI (${wPct}%)  [2-model×0.33, 3-model×0.66, 4+×1.0]`;
  }

  // ── Model loading ─────────────────────────────────────────────────────────

  const CACHE_NAME    = 'aidetect-models-v1';
  const CACHE_URL     = 'https://model-1253704911.cos.ap-nanjing.myqcloud.com/models.json';
  const CACHE_TTL_MS  = 5 * 24 * 60 * 60 * 1000;   // 5 days
  const CACHE_TS_KEY  = 'models_cache_ts';

  function hasFreshCache() {
    try {
      const ts = localStorage.getItem(CACHE_TS_KEY);
      if (!ts) {
        console.log('[cache] No timestamp found in localStorage — treating as cache miss.');
        return false;
      }
      const age = Date.now() - parseInt(ts, 10);
      const ttlLeft = CACHE_TTL_MS - age;
      if (ttlLeft > 0) {
        console.log(`[cache] Cache is fresh. Age: ${(age / 3600000).toFixed(1)}h, TTL remaining: ${(ttlLeft / 3600000).toFixed(1)}h.`);
        return true;
      } else {
        console.log(`[cache] Cache expired. Age: ${(age / 3600000).toFixed(1)}h (TTL: ${CACHE_TTL_MS / 3600000}h).`);
        return false;
      }
    } catch (e) {
      console.warn('[cache] localStorage read failed:', e);
      return false;
    }
  }

  async function loadModels() {
    const bar    = document.getElementById('loadingBar');
    const fill   = document.getElementById('loadingFill');
    const status = document.getElementById('loadingStatus');

    function fmtMB(bytes) { return (bytes / 1048576).toFixed(1) + ' MB'; }
    function enableUI() {
      document.getElementById('inputText').disabled  = false;
      document.getElementById('analyzeBtn').disabled = false;
    }

    // ── Try loading from Cache API ─────────────────────────────────────────
    if (hasFreshCache()) {
      try {
        console.log('[cache] Opening Cache API:', CACHE_NAME);
        const cache  = await caches.open(CACHE_NAME);
        const cached = await cache.match(CACHE_URL);
        if (cached) {
          console.log('[cache] Cache hit — loading models from Cache API.');
          bar.style.display  = 'block';
          fill.style.width   = '80%';
          status.textContent = 'Loading from local cache…';
          await new Promise(r => setTimeout(r, 0));   // yield for repaint
          const t0 = performance.now();
          modelsData = await cached.json();
          console.log(`[cache] models.json parsed in ${(performance.now() - t0).toFixed(0)}ms.`);
          fill.style.width   = '100%';
          status.textContent = `Ready (cached) — ${MODEL_NAMES.length} classifiers loaded.`;
          enableUI();
          setTimeout(() => { bar.style.display = 'none'; }, 800);
          return;
        } else {
          console.warn('[cache] Cache API entry missing for', CACHE_URL, '— falling through to network fetch.');
        }
      } catch (e) {
        console.warn('[cache] Cache API read failed:', e);
      }
    }

    // ── Network fetch with progress ────────────────────────────────────────
    bar.style.display  = 'block';
    fill.style.width   = '0%';
    status.textContent = 'Downloading models.json…';

    try {
      console.log('[fetch] Starting network fetch:', CACHE_URL);
      const fetchStart = performance.now();
      const response = await fetch(CACHE_URL);
      console.log(`[fetch] Response received: HTTP ${response.status} in ${(performance.now() - fetchStart).toFixed(0)}ms.`);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);

      // Content-Length is the *compressed* size (gzip); received bytes are
      // *decompressed*, so received can exceed total — clamp to avoid overshoot.
      // On lyc8503.github.io the server sends gzip Content-Length, so we use
      // the known decompressed size of models.json instead.
      const contentLength = response.headers.get('Content-Length');
      const KNOWN_DECOMPRESSED = 112338400;  // bytes, decompressed models.json
      const total = location.hostname === 'lyc8503.github.io'
        ? KNOWN_DECOMPRESSED
        : (contentLength ? parseInt(contentLength, 10) : null);
      console.log(`[fetch] Content-Length header: ${contentLength ?? 'absent'}, using total: ${total ? fmtMB(total) : 'unknown'}.`);

      const chunks = [];
      let received = 0;
      let lastLogMB = 0;

      if (response.body) {
        const reader = response.body.getReader();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          chunks.push(value);
          received += value.length;

          // Log every ~10 MB
          const receivedMB = received / 1048576;
          if (receivedMB - lastLogMB >= 10) {
            lastLogMB = Math.floor(receivedMB / 10) * 10;
            console.log(`[fetch] Downloaded ${fmtMB(received)}${total ? ' / ' + fmtMB(total) : ''}.`);
          }

          if (total) {
            // Clamp ratio to [0, 1] so gzip decompression never overshoots
            const ratio = Math.min(received / total, 1.0);
            fill.style.width = (ratio * 80).toFixed(1) + '%';
            const pct = (ratio * 100).toFixed(0);
            status.textContent =
              `Downloading… ${fmtMB(received)} / ${fmtMB(total)} (${pct}%)`;
          } else {
            fill.style.width   = '40%';
            status.textContent = `Downloading… ${fmtMB(received)}`;
          }
        }
      }

      console.log(`[fetch] Download complete: ${fmtMB(received)} in ${(performance.now() - fetchStart).toFixed(0)}ms.`);

      // Parse phase: 80 % → 100 %
      fill.style.width   = '80%';
      status.textContent = `Parsing models… (${fmtMB(received)} received)`;
      await new Promise(r => setTimeout(r, 0));   // yield for repaint

      console.log('[parse] Starting JSON parse…');
      const parseStart = performance.now();
      const blob = new Blob(chunks, { type: 'application/json' });
      const text = await blob.text();
      modelsData = JSON.parse(text);
      console.log(`[parse] JSON parsed in ${(performance.now() - parseStart).toFixed(0)}ms. Models: ${Object.keys(modelsData).join(', ')}.`);

      // ── Persist to Cache API ─────────────────────────────────────────────
      try {
        console.log('[cache] Persisting to Cache API…');
        const cache = await caches.open(CACHE_NAME);
        await cache.put(CACHE_URL, new Response(blob, {
          headers: { 'Content-Type': 'application/json' }
        }));
        localStorage.setItem(CACHE_TS_KEY, Date.now().toString());
        console.log('[cache] Saved to Cache API. Timestamp written to localStorage.');
      } catch (e) {
        console.warn('[cache] Failed to persist to Cache API (quota exceeded or private mode):', e);
      }

      fill.style.width   = '100%';
      status.textContent = `Ready — ${MODEL_NAMES.length} classifiers loaded.`;
      enableUI();
      setTimeout(() => { bar.style.display = 'none'; }, 800);

    } catch (err) {
      console.error('[fetch] Fatal error loading models:', err);
      status.textContent    = `⚠ Failed to load models: ${err.message}`;
      fill.style.background = '#dc3545';
      fill.style.width      = '100%';
    }
  }

  // ── Event wiring ──────────────────────────────────────────────────────────

  document.getElementById('analyzeBtn').addEventListener('click', async () => {
    let text = document.getElementById('inputText').value;
    const btn  = document.getElementById('analyzeBtn');

    if (!text.trim()) { alert('Please enter some text.'); return; }

    btn.disabled    = true;
    btn.textContent = 'Analyzing…';
    document.getElementById('result').textContent        = '';
    document.getElementById('verdict').textContent       = '';
    document.getElementById('charStats').textContent     = '';
    document.getElementById('modelStats').textContent    = '';
    document.getElementById('stats').textContent         = '';
    document.getElementById('weightedStats').textContent = '';
    document.getElementById('shortWarning').textContent  = '';

    // Yield to the browser for a repaint, then classify synchronously
    setTimeout(() => {
      try {
        const results = analyzeText(text);
        renderResults(results);
      } catch (err) {
        document.getElementById('result').innerHTML =
          `<span style="color:red">Error: ${err.message}</span>`;
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Analyze Text';
      }
    }, 0);
  });

  // ── Bootstrap ─────────────────────────────────────────────────────────────
  {
    const isChinese = /^zh\b/i.test(navigator.language);

    // Only show the one-time prompt when there is no valid local cache.
    if (!hasFreshCache()) {
      const _ = isChinese ? alert(
        'AI 生成文本检测 Demo\n',
        '本在线演示中使用的模型仅针对中文文本进行训练。输入其他文本可能会导致输出结果出现系统性偏差。\n'
      ) : alert(
        'AI-generated Text Detection Demo\n'
      );
    }

    loadModels();
  }
  </script>
</body>
</html>
